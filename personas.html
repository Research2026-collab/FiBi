<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Persona-Werkstatt – Finanzielle Bildung</title>
<style>
:root {
  --navy: #1a365d; --navy-light: #2a4a7f; --teal: #2b7a78; --teal-light: #3aafa9;
  --amber: #d69e2e; --red: #c53030; --green: #276749;
  --bg: #f7f8fa; --surface: #ffffff; --text: #1a202c;
  --text-muted: #4a5568; --text-light: #718096; --border: #e2e8f0;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; background:var(--bg); color:var(--text); line-height:1.6; font-size:15px; }
.app { max-width:1040px; margin:0 auto; padding:32px 20px 80px; }

/* Header */
.header { text-align:center; padding:48px 0 32px; }
.header .eyebrow { font-size:12px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:var(--teal); margin-bottom:12px; }
.header h1 { font-size:28px; font-weight:800; color:var(--navy); margin-bottom:12px; }
.header .subtitle { font-size:15px; color:var(--text-muted); max-width:620px; margin:0 auto 16px; }
.nav-links { display:flex; justify-content:center; gap:20px; margin-top:12px; }
.nav-links a { font-size:13px; color:var(--teal); text-decoration:none; border-bottom:2px solid rgba(43,122,120,0.3); padding-bottom:1px; }

/* Gallery */
.gallery { display:grid; grid-template-columns:repeat(auto-fill, minmax(180px, 1fr)); gap:16px; margin-bottom:40px; }
.persona-card {
  background:var(--surface); border:1px solid var(--border); border-radius:10px;
  overflow:hidden; cursor:pointer; transition:box-shadow 0.2s, transform 0.15s;
}
.persona-card:hover { box-shadow:0 4px 16px rgba(0,0,0,0.08); transform:translateY(-2px); }
.persona-card.active { border-color:var(--teal); box-shadow:0 0 0 2px var(--teal-light); }
.persona-img { width:100%; aspect-ratio:1; object-fit:cover; display:block; }
.persona-card-info { padding:10px 12px; }
.persona-card-name { font-size:14px; font-weight:700; color:var(--navy); }
.persona-card-desc { font-size:12px; color:var(--text-light); margin-top:2px; }

/* Bildungsrahmen */
.rahmen { display:grid; grid-template-columns:repeat(auto-fit, minmax(200px,1fr)); gap:12px; margin-bottom:32px; padding:20px; background:var(--surface); border:1px solid var(--border); border-radius:10px; }
.rahmen-item { padding:12px; background:var(--bg); border-radius:6px; }
.rahmen-item strong { font-size:12px; color:var(--teal); text-transform:uppercase; letter-spacing:0.04em; display:block; margin-bottom:4px; }
.rahmen-item span { font-size:13px; color:var(--text-muted); }

/* Detail panel */
.detail-panel { display:none; margin-bottom:32px; }
.detail-panel.active { display:block; }
.detail-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; overflow:hidden; }
.detail-top { display:flex; gap:24px; padding:24px; }
.detail-img { width:160px; height:160px; border-radius:8px; object-fit:cover; flex-shrink:0; }
.detail-header h2 { font-size:22px; font-weight:800; color:var(--navy); margin-bottom:4px; }
.detail-header .detail-sub { font-size:14px; color:var(--text-muted); margin-bottom:12px; }
.detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.detail-field label { font-size:11px; font-weight:700; color:var(--teal); text-transform:uppercase; letter-spacing:0.04em; display:block; margin-bottom:2px; }
.detail-field p { font-size:13px; color:var(--text); }
.detail-bottom { padding:0 24px 20px; }
.detail-themen { display:flex; flex-wrap:wrap; gap:6px; margin-top:12px; }
.themen-tag { font-size:12px; padding:4px 10px; border-radius:12px; background:#ebf8ff; color:var(--navy); font-weight:500; }
.btn-develop { margin-top:16px; padding:10px 24px; border-radius:6px; font-size:14px; font-weight:600; cursor:pointer; border:none; background:var(--teal); color:#fff; font-family:inherit; transition:background 0.2s; }
.btn-develop:hover { background:var(--navy-light); }
.btn-close { background:none; border:none; font-size:13px; color:var(--text-light); cursor:pointer; font-family:inherit; padding:6px 12px; }

/* Form */
.form-panel { display:none; margin-bottom:32px; }
.form-panel.active { display:block; }
.form-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:24px; }
.form-card h3 { font-size:18px; font-weight:700; color:var(--navy); margin-bottom:4px; }
.form-card .form-sub { font-size:13px; color:var(--text-muted); margin-bottom:20px; }
.form-field { margin-bottom:16px; }
.form-field label { font-size:13px; font-weight:600; display:block; margin-bottom:4px; }
.form-field .hint { font-size:12px; color:var(--text-light); margin-bottom:4px; }
input[type="text"],textarea,select { width:100%; padding:10px 12px; border:1px solid var(--border); border-radius:6px; font-size:14px; font-family:inherit; color:var(--text); background:var(--bg); }
input:focus,textarea:focus,select:focus { outline:none; border-color:var(--teal); box-shadow:0 0 0 3px rgba(43,122,120,0.1); }
textarea { min-height:70px; resize:vertical; }
.check-group { display:flex; flex-wrap:wrap; gap:6px; }
.check-item { display:flex; align-items:center; gap:6px; padding:6px 10px; border:1px solid var(--border); border-radius:6px; cursor:pointer; font-size:13px; transition:all 0.15s; }
.check-item:hover { border-color:var(--teal-light); }
.check-item.selected { border-color:var(--teal); background:#ebf8ff; }
.check-item input { accent-color:var(--teal); }

/* Output */
.output-panel { display:none; margin-bottom:32px; }
.output-panel.active { display:block; }
.output-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:24px; }
.output-card h3 { font-size:18px; font-weight:700; color:var(--navy); margin-bottom:12px; }
.output-text { white-space:pre-wrap; background:var(--bg); padding:16px; border-radius:6px; font-size:13px; line-height:1.7; }
.output-actions { display:flex; gap:8px; margin-top:16px; flex-wrap:wrap; }
.output-actions button { padding:8px 16px; border-radius:6px; font-size:13px; font-weight:600; cursor:pointer; border:1px solid var(--border); background:var(--surface); color:var(--text-muted); font-family:inherit; }
.output-actions button:hover { border-color:var(--teal); color:var(--teal); }
.output-actions .btn-primary { background:var(--teal); color:#fff; border-color:var(--teal); }

@media(max-width:600px) {
  .gallery { grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); }
  .detail-top { flex-direction:column; gap:16px; }
  .detail-img { width:100%; height:200px; }
  .detail-grid { grid-template-columns:1fr; }
}
@media print {
  .gallery,.nav-links,.btn-develop,.btn-close,.output-actions { display:none!important; }
  .detail-panel,.output-panel { display:block!important; }
}
</style>
</head>
<body>

let selectedPersona = null;

function init() {
  const g = document.getElementById('gallery');
  g.innerHTML = PERSONAS.map(p =>
    `<div class="persona-card" id="pc-${p.id}" onclick="selectPersona(${p.id})">
      <img class="persona-img" src="${p.img}" alt="${p.name}" loading="lazy">
      <div class="persona-card-info">
        <div class="persona-card-name">${p.name}, ${p.alter}</div>
        <div class="persona-card-desc">${p.kurz}</div>
      </div>
    </div>`
  ).join('');
}

function selectPersona(id) {
  selectedPersona = PERSONAS.find(p => p.id === id);
  if (!selectedPersona) return;
  document.querySelectorAll('.persona-card').forEach(c => c.classList.remove('active'));
  document.getElementById('pc-' + id).classList.add('active');
  document.getElementById('outputPanel').classList.remove('active');

  const p = selectedPersona;
  const dp = document.getElementById('detailPanel');
  dp.innerHTML = `<div class="detail-card">
    <div class="detail-top">
      <img class="detail-img" src="${p.img}" alt="${p.name}">
      <div class="detail-header">
        <h2>${p.name}, ${p.alter}</h2>
        <div class="detail-sub">${p.kurz}</div>
        <div class="detail-grid">
          <div class="detail-field"><label>Lebenslage</label><p>${p.lage}</p></div>
          <div class="detail-field"><label>Bildung & Lernerfahrung</label><p>${p.bildung}</p></div>
          <div class="detail-field"><label>Finanzielle Ausgangslage</label><p>${p.finanzen}</p></div>
          <div class="detail-field"><label>Barrieren & Sensibilitäten</label><p>${p.barrieren}</p></div>
        </div>
        <div class="detail-themen">${p.themen.map(t => `<span class="themen-tag">${t}</span>`).join('')}</div>
        <div style="margin-top:16px;display:flex;gap:8px;align-items:center;">
          <button class="btn-develop" onclick="openForm()">Angebot für ${p.name} entwickeln</button>
          <button class="btn-close" onclick="closeDetail()">Schließen</button>
        </div>
      </div>
    </div>
  </div>`;
  dp.classList.add('active');
  dp.scrollIntoView({behavior:'smooth', block:'start'});
}

function closeDetail() {
  document.getElementById('detailPanel').classList.remove('active');
  document.querySelectorAll('.persona-card').forEach(c => c.classList.remove('active'));
  selectedPersona = null;
}

function openForm() {
  if (!selectedPersona) return;
  const p = selectedPersona;
  const fp = document.getElementById('formPanel');
  fp.innerHTML = `<div class="form-card">
    <h3>Angebot für ${p.name} entwickeln</h3>
    <p class="form-sub">${p.kurz}, ${p.alter} Jahre. Berücksichtigen Sie die Lebenslage, Barrieren und Themeninteressen.</p>

    <div class="form-field">
      <label>Welche Themen soll das Angebot aufgreifen?</label>
      <div class="hint">Aus den Themeninteressen von ${p.name}</div>
      <div class="check-group" id="themenChecks">
        ${p.themen.map((t,i) => `<label class="check-item" onclick="this.classList.toggle('selected')"><input type="checkbox" name="f_themen" value="${t}" checked> ${t}</label>`).join('')}
      </div>
    </div>

    <div class="form-field">
      <label>Arbeitstitel</label>
      <input type="text" id="f_titel" placeholder="z. B. Mein Budget im Griff – Workshop für Berufseinsteiger:innen">
    </div>

    <div class="form-field">
      <label>Lernziel</label>
      <div class="hint">Was soll ${p.name} nach dem Angebot können oder wissen?</div>
      <textarea id="f_lernziel" placeholder="z. B. Die Teilnehmenden können ein monatliches Budget erstellen und kennen drei Wege, Kosten zu senken."></textarea>
    </div>

    <div class="form-field">
      <label>Wirkungsrichtung</label>
      <select id="f_wirkung">
        <option value="informierend">Informierend – Wissen und Orientierung</option>
        <option value="reflektierend">Reflektierend – eigene Situation einordnen</option>
        <option value="anwendungsorientiert" selected>Anwendungsorientiert – im Alltag umsetzen</option>
      </select>
    </div>

    <div class="form-field">
      <label>Format</label>
      <select id="f_format">
        <option value="einzelveranstaltung">Einzelveranstaltung (bis 3 UE)</option>
        <option value="reihe">Reihe oder Kurs (mehr als 3 UE)</option>
      </select>
    </div>

    <div class="form-field">
      <label>Lernform</label>
      <select id="f_lernform">
        <option value="praesenz">Präsenz</option>
        <option value="online">Online synchron</option>
        <option value="hybrid">Hybrid</option>
      </select>
    </div>

    <div class="form-field">
      <label>Wie gehen Sie mit den Barrieren von ${p.name} um?</label>
      <div class="hint">${p.barrieren}</div>
      <textarea id="f_barrieren" placeholder="z. B. Einfache Sprache, kurze Einheiten, kein Frontalvortrag, anonyme Einstiegsfragen"></textarea>
    </div>

    <div class="form-field">
      <label>Besondere methodische Hinweise</label>
      <textarea id="f_methode" placeholder="z. B. Arbeitsblätter zum Mitnehmen, Kleingruppenarbeit, Praxisbeispiele"></textarea>
    </div>

    <div style="display:flex;gap:8px;margin-top:20px;">
      <button class="btn-develop" onclick="generateOutput()">Angebot generieren</button>
      <button class="btn-close" onclick="document.getElementById('formPanel').classList.remove('active')">Abbrechen</button>
    </div>
  </div>`;
  fp.classList.add('active');
  fp.scrollIntoView({behavior:'smooth', block:'start'});
}

function generateOutput() {
  if (!selectedPersona) return;
  const p = selectedPersona;
  const themen = Array.from(document.querySelectorAll('input[name="f_themen"]:checked')).map(c => c.value);
  const titel = document.getElementById('f_titel').value || `Finanzielle Bildung für ${p.kurz}`;
  const lernziel = document.getElementById('f_lernziel').value;
  const wirkung = document.getElementById('f_wirkung').value;
  const format = document.getElementById('f_format').value;
  const lernform = document.getElementById('f_lernform').value;
  const barrieren = document.getElementById('f_barrieren').value;
  const methode = document.getElementById('f_methode').value;

  const wL = {informierend:'informierend', reflektierend:'reflektierend', anwendungsorientiert:'anwendungsorientiert'};
  const fL = {einzelveranstaltung:'Einzelveranstaltung', reihe:'Reihe/Kurs'};
  const lL = {praesenz:'Präsenz', online:'Online synchron', hybrid:'Hybrid'};

  // Build Ausschreibungsentwurf
  let ae = titel + '\n\n';
  ae += `Dieses Angebot richtet sich an Menschen in einer Lebenssituation wie der von ${p.name}: ${p.lage}\n\n`;
  if (themen.length) ae += `Themen: ${themen.join(', ')}.\n\n`;
  if (lernziel) ae += `Am Ende der Veranstaltung ${lernziel.charAt(0).toLowerCase() + lernziel.slice(1)}${lernziel.endsWith('.') ? '' : '.'}\n\n`;
  if (wirkung === 'informierend') ae += 'Die Veranstaltung vermittelt Grundlagenwissen verständlich und praxisnah. Vorkenntnisse sind nicht erforderlich.\n\n';
  else if (wirkung === 'reflektierend') ae += 'In einem geschützten Rahmen können Sie Ihre eigene finanzielle Situation einordnen und gemeinsam mit anderen reflektieren.\n\n';
  else ae += 'Im Mittelpunkt steht das praktische Tun. Sie arbeiten an Ihrer eigenen Situation und nehmen konkrete nächste Schritte mit.\n\n';
  if (barrieren) ae += `Uns ist wichtig: ${barrieren}\n\n`;
  if (methode) ae += `Methodik: ${methode}\n\n`;
  ae += '—\n\n';
  ae += `Format: ${fL[format]}\nLernform: ${lL[lernform]}\n`;
  ae += 'Termin: [bitte einsetzen]\nOrt: [bitte einsetzen]\nAnmeldung: [bitte einsetzen]\n';

  // Build internal documentation
  let doc = `PERSONA-BEZOGENE ANGEBOTSPLANUNG\n`;
  doc += `${'='.repeat(40)}\n\n`;
  doc += `Persona: ${p.name}, ${p.alter} – ${p.kurz}\n`;
  doc += `Lebenslage: ${p.lage}\n`;
  doc += `Bildung: ${p.bildung}\n`;
  doc += `Finanzielle Ausgangslage: ${p.finanzen}\n`;
  doc += `Barrieren: ${p.barrieren}\n\n`;
  doc += `Angebot: ${titel}\n`;
  doc += `Themen: ${themen.join(', ')}\n`;
  doc += `Lernziel: ${lernziel || '–'}\n`;
  doc += `Wirkungsrichtung: ${wL[wirkung]}\n`;
  doc += `Format: ${fL[format]}, ${lL[lernform]}\n`;
  doc += `Umgang mit Barrieren: ${barrieren || '–'}\n`;
  doc += `Methodik: ${methode || '–'}\n`;

  const op = document.getElementById('outputPanel');
  op.innerHTML = `<div class="output-card">
    <h3>Angebot für ${p.name}</h3>
    <p style="font-size:13px;color:var(--text-muted);margin-bottom:16px;">${p.kurz}, ${p.alter} Jahre</p>

    <div style="font-size:12px;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:0.04em;margin-bottom:4px;">Ausschreibungsentwurf</div>
    <div class="output-text" id="outAE">${esc(ae)}</div>

    <div style="font-size:12px;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:0.04em;margin:16px 0 4px;">Persona-Dokumentation (intern)</div>
    <div class="output-text" id="outDoc">${esc(doc)}</div>

    <div class="output-actions">
      <button onclick="downloadText('${esc(titel)}', 'ae')">Ausschreibung herunterladen</button>
      <button onclick="downloadText('${esc(titel)}', 'doc')">Dokumentation herunterladen</button>
      <button class="btn-primary" onclick="downloadForPool('${esc(titel)}')">An Materialpool senden</button>
      <button onclick="openForm()">Überarbeiten</button>
    </div>
  </div>`;
  op.classList.add('active');
  op.scrollIntoView({behavior:'smooth', block:'start'});
}

function downloadText(titel, type) {
  const el = type === 'ae' ? document.getElementById('outAE') : document.getElementById('outDoc');
  const text = el.textContent;
  const blob = new Blob([text], {type:'text/plain;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${titel.replace(/[^a-zA-Z0-9äöüÄÖÜß\s-]/g,'').replace(/\s+/g,'_')}_${type}.txt`;
  a.click();
}

function downloadForPool(titel) {
  if (!selectedPersona) return;
  const p = selectedPersona;
  const themen = Array.from(document.querySelectorAll('input[name="f_themen"]:checked')).map(c => c.value);
  const ae = document.getElementById('outAE').textContent;
  const shareData = {
    meta: {
      titel: document.getElementById('f_titel').value || titel,
      zielgruppe: `${p.kurz} (Persona: ${p.name}, ${p.alter})`,
      wirkung: document.getElementById('f_wirkung').value,
      format: document.getElementById('f_format').value,
      trends: [],
      einrichtung: null,
      kontakt: null,
      datum: new Date().toISOString().slice(0,10),
      quelle: "persona-werkstatt"
    },
    materialien: [{typ:"ausschreibung", inhalt: ae}]
  };
  const blob = new Blob([JSON.stringify(shareData,null,2)], {type:'application/json;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `Materialfreigabe_${titel.replace(/[^a-zA-Z0-9äöüÄÖÜß\s-]/g,'').replace(/\s+/g,'_')}.json`;
  a.click();
  alert('Die Datei wurde heruntergeladen. Senden Sie sie per E-Mail an die Redaktion des Materialpools.');
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

init();
</script>
</body>
</html>
